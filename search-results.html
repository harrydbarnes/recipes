<!DOCTYPE html>
<html lang="en">

    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Reenie+Beanie&display=swap" rel="stylesheet">

</head>
<body>
    <a href="index.html" class="back-button">&larr; Home</a>

        <div class="page-content">
            <h1 class="recipe-title">Search</h1>
            <div class="search-container">
                <input type="search" id="search-input" placeholder="Start typing to search...">
            </div>

            <div class="results-section">

                    <!-- Matching recipes will be displayed here -->

    <script src="js/recipes.js" defer></script>
    <script src="js/search.js" defer></script>

        <a href="index.html" class="nav-link">
            <span class="icon">🏠</span>

        </a>
        <a href="fridge-raider.html" class="nav-link">

        </a>
        <a href="pantry.html" class="nav-link">
            <span class="icon">🥫</span>

        <a href="search-results.html" class="nav-link">
